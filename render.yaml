services:
  - type: web
    name: taskhive
    runtime: php
    plan: free
    buildCommand: >
      composer install --no-dev --optimize-autoloader &&
      npm ci &&
      npm run build &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      php artisan migrate --force
    startCommand: php artisan serve --host 0.0.0.0 --port 10000
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: TaskHive
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://taskhive.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: taskhive-db
          property: connectionString
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: taskhive-db
    plan: free
    databaseName: taskhive
    user: taskhive
