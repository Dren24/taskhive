services:
  - type: web
    name: taskhive
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: TaskHive
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: taskhive-db
          property: connectionString
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info

databases:
  - name: taskhive-db
    plan: free
    databaseName: taskhive
    user: taskhive
